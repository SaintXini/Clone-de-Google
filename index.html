<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Clone</title>
    <link rel="stylesheet" href="css/estilos.css"
</head>
<body>

    <header>
        <nav>
            <a href="" class="nav-link">Gmail</a>
            <a href="" class="nav-link">Imagenes</a>
            <a href="" class="nav-apps">
                <img src="img/apps-icon.png" alt="" width="25">
            </a>
            <a href="" class="nav-login">Iniciar Sesion</a>
        </nav>
    </header>

    <main>
        <section class="logo">
            <img src="img/logo-google.png" alt="Logo de Google" width="300px">

        </section>
        <section class="buscador-bar">
            <form action="">
                <label class="label-buscador">
                    <img src="img/search-icon.png" alt="Icono de buscar" width="25px" class="icon-buscar">
                    <input type="text" name="buscar" id="buscar">
                    <a href="">
                        <img src="img/mic-icon.png" alt="icono de micro" width="25px">
                    </a>
                    <a href="">
                        <img src="img/camera-icon.png" alt="icono de camara">
                    </a>
                </label>
            </form>
        </section>
        <section class="botones">
            <button>Buscar con Google</button>
            <button>Voy a tener Suerte</button>
            <p>
                Ofrecido por Google en:
                <a href="">Español (Latinoamerica)</a>
                <a href="">Kaqchikel</a>
            </p>
        </section>
    </main>

    <footer>
        <div class="pais">
            Guatemala
        </div>
        <div class="footer-links">
            <ul>
                <li>Sobre Google</li>
                <li>Publicidad</li>
                <li>Negocios</li>
                <li>Cómo funciona la Busqueda</li>
            </ul>

            <ul>
                <li>Privacidad</li>
                <li>Condiciones</li>
                <li>Preferencias</li>
            </ul>
        </div>
    </footer>

</body>
</html>
